name: desktop-app CI

# Typecheck and run the desktop-app test suite on every target platform.
on:
  push:
    branches: [main]
    paths: ['desktop-app/**', '.github/workflows/desktop-app-ci.yml']
  pull_request:
    paths: ['desktop-app/**', '.github/workflows/desktop-app-ci.yml']

defaults:
  run:
    working-directory: desktop-app

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test
