name: desktop-app CI

# Lint, typecheck, and run the desktop-app test suites on every target platform.
on:
  push:
    branches: [main]
    paths: ['desktop-app/**', '.github/workflows/desktop-app-ci.yml']
  pull_request:
    paths: ['desktop-app/**', '.github/workflows/desktop-app-ci.yml']

defaults:
  run:
    working-directory: desktop-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - run: npm ci

      # Linux CI has no display; run the Electron smoke tests under a virtual one.
      - name: E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e

      - name: E2E (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: desktop-app/playwright-report/
          retention-days: 7
