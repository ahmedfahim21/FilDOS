name: Website

# Lint and build the marketing site under website/.
on:
  push:
    branches: [main]
    paths: ['website/**', '.github/workflows/website.yml']
  pull_request:
    paths: ['website/**', '.github/workflows/website.yml']

defaults:
  run:
    working-directory: website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
